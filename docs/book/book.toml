[book]
authors = ["zigbee-rs contributors"]
language = "en"
src = "src"
title = "The zigbee-rs Book"
description = "Comprehensive guide to building Zigbee PRO devices in Rust"

[build]
build-dir = "book"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/faronov/zigbee-rs"
edit-url-template = "https://github.com/faronov/zigbee-rs/edit/master/docs/book/{path}"
site-url = "/zigbee-rs/"
